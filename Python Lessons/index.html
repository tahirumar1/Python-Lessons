<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="styles.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  .wrap { padding: 1rem 0; font-size: 14px; color: var(--color-text-primary); }
  .course-header { margin-bottom: 1.5rem; }
  .course-title { font-size: 22px; font-weight: 500; margin: 0 0 4px; }
  .course-meta { font-size: 13px; color: var(--color-text-secondary); margin: 0 0 1rem; }
  .stat-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 16px; flex: 1; min-width: 100px; }
  .stat-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 2px; }
  .stat-value { font-size: 20px; font-weight: 500; }
  /* week blocks and filters */
  .week-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.2rem; }
  .filter-btn { background: none; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 6px 14px; font-size: 13px; cursor: pointer; color: var(--color-text-secondary); transition: all .15s; }
  .filter-btn.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); font-weight: 500; }
  .filter-btn:hover:not(.active) { background: var(--color-background-secondary); color: var(--color-text-primary); }
  .week-block { margin-bottom: 1.4rem; }
  .week-header { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; justify-content: space-between; align-items: center; }
  .week-theme { font-size: 11px; font-weight: 400; padding: 2px 8px; border-radius: 20px; }
  /* day cards */
  .days-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; }
  .day-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px; cursor: pointer; transition: border-color .15s, box-shadow .15s; position: relative; overflow: hidden; }
  .day-card:hover { border-color: var(--color-border-secondary); }
  .day-card.expanded { border-color: var(--color-border-info); }
  .day-card .day-num { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 4px; }
  .day-card .day-title { font-size: 12px; font-weight: 500; line-height: 1.4; }
  .day-card .day-type { font-size: 10px; margin-top: 5px; padding: 2px 6px; border-radius: 10px; display: inline-block; }
  .day-detail { display: none; margin-top: 1.2rem; background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; border: 0.5px solid var(--color-border-tertiary); }
  .day-detail.visible { display: block; }
  /* detail panel */
  .detail-title { font-size: 16px; font-weight: 500; margin: 0 0 4px; }
  .detail-meta { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 1rem; }
  .detail-section { margin-bottom: 1rem; }
  .detail-section h4 { font-size: 13px; font-weight: 500; margin: 0 0 6px; color: var(--color-text-secondary); display: flex; align-items: center; gap: 6px; }
  .detail-section ul { margin: 0; padding-left: 18px; font-size: 13px; line-height: 1.8; color: var(--color-text-primary); }
  /* activity card and badges */
  .activity-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 8px 12px; margin-bottom: 6px; font-size: 13px; }
  .activity-card strong { font-weight: 500; }
  .check-card { background: var(--color-background-success); border-radius: var(--border-radius-md); padding: 8px 12px; font-size: 13px; color: var(--color-text-success); }
  .close-btn { float: right; background: none; border: none; cursor: pointer; font-size: 18px; color: var(--color-text-secondary); line-height: 1; padding: 0; margin-left: 8px; }
  .badge-new { background: var(--color-background-info); color: var(--color-text-info); }
  .badge-review { background: var(--color-background-warning); color: var(--color-text-warning); }
  .badge-project { background: var(--color-background-success); color: var(--color-text-success); }
  .badge-adv { background: var(--color-background-danger); color: var(--color-text-danger); }
</style>
</head>

<body>
<div class ="lp">
<h2 class="sr-only">Python Complete Course - 40 Lesson Plan for Beginners</h2>
<div class="wrap">

    <p class="course-title">Python Complete Course</p>

  </div>
  <div class="stat-row">
    <div class="stat"><div class="stat-label">Total lessons</div><div class="stat-value">40</div></div>

    <div class="stat"><div class="stat-label">Projects</div><div class="stat-value">8</div></div>

  <div class="week-filter" id="filters"></div>

  <div id="detail-panel" class="day-detail"></div>

        check: "Does your program crash if the user types unexpected input? Fix any crashes found." },
      { title: "Final presentations & celebration", type: "project",
        objectives: ["Present a complete working program", "Explain key design decisions", "Reflect on the learning journey"],
        activities: [
          { name: "Demos", desc: "Each student presents their project (3–5 min), explains one thing they're proud of." },
          { name: "Reflection", desc: "Write 3 things learned, 1 thing that was hard, 1 thing to explore next." }
        ],
        check: "What Python concept from this course will you use most in the future, and why?" }
    ]
  }
];

function renderFilters() {
  const div = document.getElementById('filters');
  const all = document.createElement('button');
  all.className = 'filter-btn active'; all.textContent = 'All weeks';
  all.onclick = () => { setActive(all); renderSchedule(-1); };
  div.appendChild(all);
  weeks.forEach((w, i) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn'; btn.textContent = 'Week ' + w.week;
    btn.onclick = () => { setActive(btn); renderSchedule(i); };
    div.appendChild(btn);
  });
}

function setActive(el) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('detail-panel').classList.remove('visible');
}

function renderSchedule(weekIdx) {
  const sched = document.getElementById('schedule');
  sched.innerHTML = '';
  const toRender = weekIdx === -1 ? weeks : [weeks[weekIdx]];
  toRender.forEach(w => {
    const block = document.createElement('div');
    block.className = 'week-block';
    block.innerHTML = `<div class="week-header"><span>Week ${w.week} - 5 lessons</span><span class="week-theme ${w.color}">${w.theme}</span></div>`;
    const grid = document.createElement('div');
    grid.className = 'days-grid';
    w.days.forEach((d, di) => {
      const lessonNum = (w.week - 1) * 5 + di + 1;
      const card = document.createElement('div');
      card.className = 'day-card';
      card.id = 'card-' + lessonNum;
      card.innerHTML = `<div class="day-num">Lesson ${lessonNum}</div><div class="day-title">${d.title}</div><div class="day-type ${d.type === 'project' ? 'badge-project' : d.type === 'review' ? 'badge-review' : 'badge-new'}">${d.type === 'project' ? '🛠 Project' : d.type === 'review' ? '🔄 Review' : '✦ New'}</div>`;
      card.onclick = () => showDetail(w.week, di, lessonNum, card);
      grid.appendChild(card);
    });
    block.appendChild(grid);
    sched.appendChild(block);
  });
}

function showDetail(weekIdx, dayIdx, lessonNum, card) {
  const w = weeks[weekIdx - 1];
  const d = w.days[dayIdx];
  const panel = document.getElementById('detail-panel');
  document.querySelectorAll('.day-card').forEach(c => c.classList.remove('expanded'));
  if (panel.dataset.active === String(lessonNum) && panel.classList.contains('visible')) {
    panel.classList.remove('visible'); panel.dataset.active = ''; return;
  }
  card.classList.add('expanded');
  panel.dataset.active = String(lessonNum);
  panel.classList.add('visible');
  panel.innerHTML = `
    <button class="close-btn" onclick="document.getElementById('detail-panel').classList.remove('visible');document.querySelectorAll('.day-card').forEach(c=>c.classList.remove('expanded'))">✕</button>
    <div class="detail-title">Lesson ${lessonNum}: ${d.title}</div>
    <div class="detail-meta">Week ${weekIdx} · ${w.theme} · 45–60 min</div>
    <div class="detail-section">
      <h4><i class="ti ti-target" aria-hidden="true"></i> Learning objectives</h4>
      <ul>${d.objectives.map(o => `<li>${o}</li>`).join('')}</ul>
    </div>
    <div class="detail-section">
      <h4><i class="ti ti-puzzle" aria-hidden="true"></i> Activities</h4>
      ${d.activities.map(a => `<div class="activity-card"><strong>${a.name}:</strong> ${a.desc}</div>`).join('')}
    </div>
    <div class="detail-section">
      <h4><i class="ti ti-checkbox" aria-hidden="true"></i> Check for understanding</h4>
      <div class="check-card">${d.check}</div>
    </div>
    <button style="margin-top:12px;font-size:13px;" onclick="window.location.href='lesson_ (' + ${lessonNum} + ').html'">Get full lesson details ↗</button>
  `;
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

renderFilters();
renderSchedule(-1);
</script>
</body>
</html>
